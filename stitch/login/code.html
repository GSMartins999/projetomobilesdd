<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Curata - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;family=DM+Sans:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#D4963A",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'DM Sans', sans-serif;
        }
        .font-display {
            font-family: 'Public Sans', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col">
<main class="flex-1 flex flex-col items-center justify-center px-6 py-12">
<div class="w-full max-w-[400px] flex flex-col gap-8">
<div class="flex flex-col items-center gap-4">
<div class="flex items-center justify-center size-16 rounded-xl bg-primary/10 text-primary">
<span class="material-symbols-outlined text-[40px]">palette</span>
</div>
<div class="text-center">
<h1 class="text-3xl font-bold font-display text-slate-900 dark:text-slate-100 tracking-tight">Curata</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Acesso ao sistema de conservação</p>
</div>
</div>
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1" for="email">E-mail</label>
<input class="w-full h-12 px-4 rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors placeholder:text-slate-400" id="email" name="email" placeholder="seu@email.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center ml-1">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Senha</label>
</div>
<div class="relative group">
<input class="w-full h-12 px-4 rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-colors placeholder:text-slate-400" id="password" name="password" placeholder="Sua senha" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-white font-bold rounded-lg transition-all shadow-lg shadow-primary/10 mt-2 flex items-center justify-center gap-2" type="submit">
                    Entrar
                </button>
<div class="text-center">
<a class="text-sm font-medium text-primary hover:underline underline-offset-4" href="#">Esqueceu sua senha?</a>
</div>
</form>
</div>
</main>
<footer class="py-8 px-6 text-center">
<div class="flex items-center justify-center gap-2 text-slate-400 dark:text-slate-500 text-xs font-medium tracking-wide uppercase">
<span>Curata</span>
<span class="size-1 rounded-full bg-slate-300 dark:bg-slate-600"></span>
<span>Conservação de Arte</span>
</div>
</footer>
</body></html>
