<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
<style>
        .parchment-map {
            background-color: #f4ece1;
            background-image: radial-gradient(#e5d9c5 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .marker-shadow {
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col">
<!-- Header / Top Bar -->
<div class="absolute top-0 left-0 right-0 z-20 flex items-center justify-between p-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-3">
<div class="flex h-10 w-10 items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300">search</span>
</div>
<h1 class="text-xl font-bold tracking-tight text-primary">Curata</h1>
</div>
<div class="flex items-center gap-2">
<div class="flex h-10 w-10 items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800 text-green-600 dark:text-green-400">
<span class="material-symbols-outlined">cloud_done</span>
</div>
</div>
</div>
<!-- Full-screen Map Area -->
<div class="relative flex-1 parchment-map overflow-hidden" data-location="Ouro Preto, Brazil" style="">
<!-- Simulated Map Elements -->
<div class="absolute inset-0 opacity-20 pointer-events-none">
<svg height="100%" width="100%" xmlns="http://www.w3.org/2000/svg">
<path class="text-slate-400" d="M0,100 Q150,50 300,150 T600,100" fill="none" stroke="currentColor" stroke-width="2"></path>
<path class="text-slate-400" d="M100,0 Q150,200 50,400" fill="none" stroke="currentColor" stroke-width="2"></path>
<path class="text-slate-400" d="M400,0 L450,600" fill="none" stroke="currentColor" stroke-width="2"></path>
</svg>
</div>
<!-- Art Markers -->
<!-- Marker Green (Bom) -->
<div class="absolute top-1/3 left-1/4 marker-shadow">
<span class="material-symbols-outlined text-4xl text-green-500" style="font-variation-settings: 'FILL' 1">location_on</span>
</div>
<!-- Marker Amber (Regular) - Tapped State Highlight -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 marker-shadow z-10">
<div class="relative">
<div class="absolute inset-0 animate-ping rounded-full bg-amber-400/40"></div>
<span class="material-symbols-outlined text-5xl text-amber-500 scale-110" style="font-variation-settings: 'FILL' 1">location_on</span>
</div>
</div>
<!-- Marker Orange (Precário) -->
<div class="absolute top-1/4 right-1/3 marker-shadow">
<span class="material-symbols-outlined text-4xl text-orange-500" style="font-variation-settings: 'FILL' 1">location_on</span>
</div>
<!-- Marker Red (Urgente) -->
<div class="absolute bottom-1/3 left-1/2 marker-shadow">
<span class="material-symbols-outlined text-4xl text-red-600" style="font-variation-settings: 'FILL' 1">location_on</span>
</div>
<!-- Zoom Controls -->
<div class="absolute right-4 top-24 flex flex-col gap-1">
<button class="flex h-10 w-10 items-center justify-center rounded-t-xl bg-white dark:bg-slate-800 shadow-lg border-b border-slate-100 dark:border-slate-700">
<span class="material-symbols-outlined">add</span>
</button>
<button class="flex h-10 w-10 items-center justify-center rounded-b-xl bg-white dark:bg-slate-800 shadow-lg">
<span class="material-symbols-outlined">remove</span>
</button>
<button class="mt-2 flex h-10 w-10 items-center justify-center rounded-xl bg-white dark:bg-slate-800 shadow-lg">
<span class="material-symbols-outlined">my_location</span>
</button>
</div>
<!-- Floating FAB Button -->
<div class="absolute bottom-48 right-4 z-10">
<button class="flex h-14 items-center gap-2 px-6 rounded-full bg-amber-500 text-white shadow-2xl hover:bg-amber-600 transition-colors font-bold">
<span class="material-symbols-outlined">add_circle</span>
                    Nova Obra
                </button>
</div>
<!-- Floating Tapped Artwork Card -->
<div class="absolute bottom-6 left-4 right-4 z-20">
<div class="flex items-stretch gap-4 rounded-2xl bg-white dark:bg-slate-900 p-4 shadow-2xl border border-slate-200 dark:border-slate-800 max-w-lg mx-auto">
<div class="relative w-28 h-28 shrink-0 overflow-hidden rounded-xl">
<img alt="Fotografia de uma estátua histórica em bronze" class="h-full w-full object-cover" data-alt="Estátua histórica de bronze com pátina" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAcqIGAvKiHw1wukwdCwQo9FhwAzJkB0KwgWRG4qcnThfrAiatQCb9e0P8ItslUYxsYqMnHFpMsku3SAa_n-PP8J0oeYlf6D1GAn9lPeVoIDCS2V-UdsHDQ0hhustyRrLJfI24aI_rAI-uYYw8pwK1lTze2z4bzAYFEDQhAzS22ubyAoTIaj02yqDvoYW2JrKZ2sBnM1fk-UD3Og2KQSP37w6AWXzJiIkNqx5sx7J-WEIn1lIpUfymvJhjKOT2zpN5cTpuzcYFVpEQI"/>
</div>
<div class="flex flex-1 flex-col justify-between py-1">
<div>
<div class="flex items-start justify-between gap-2">
<h3 class="text-lg font-bold leading-tight">Estátua de D. Pedro I</h3>
<span class="material-symbols-outlined text-slate-400 text-sm">more_vert</span>
</div>
<p class="text-slate-500 dark:text-slate-400 text-sm">Praça Tiradentes, Centro</p>
<div class="mt-2 inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 text-xs font-bold uppercase tracking-wider">
<span class="h-2 w-2 rounded-full bg-amber-500"></span>
                                Regular
                            </div>
</div>
<button class="flex items-center justify-center gap-2 w-full py-2 rounded-lg bg-primary/10 text-primary font-bold text-sm hover:bg-primary/20 transition-colors">
                            Ver detalhes
                            <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>
</div>
</div>
<!-- Filter Chips (Floating above card) -->
<div class="absolute bottom-44 left-0 right-0 overflow-x-auto no-scrollbar px-4 flex gap-2">
<div class="flex h-9 shrink-0 items-center justify-center gap-2 rounded-full bg-green-100 dark:bg-green-900/40 border border-green-200 dark:border-green-800 px-4">
<span class="material-symbols-outlined text-green-600 dark:text-green-400 text-lg">check_circle</span>
<span class="text-green-800 dark:text-green-300 text-sm font-semibold">Bom</span>
</div>
<div class="flex h-9 shrink-0 items-center justify-center gap-2 rounded-full bg-amber-100 dark:bg-amber-900/40 border border-amber-300 dark:border-amber-700 px-4 ring-2 ring-primary/50">
<span class="material-symbols-outlined text-amber-600 dark:text-amber-400 text-lg">info</span>
<span class="text-amber-800 dark:text-amber-300 text-sm font-semibold">Regular</span>
</div>
<div class="flex h-9 shrink-0 items-center justify-center gap-2 rounded-full bg-orange-100 dark:bg-orange-900/40 border border-orange-200 dark:border-orange-800 px-4">
<span class="material-symbols-outlined text-orange-600 dark:text-orange-400 text-lg">warning</span>
<span class="text-orange-800 dark:text-orange-300 text-sm font-semibold">Precário</span>
</div>
<div class="flex h-9 shrink-0 items-center justify-center gap-2 rounded-full bg-red-100 dark:bg-red-900/40 border border-red-200 dark:border-red-800 px-4">
<span class="material-symbols-outlined text-red-600 dark:text-red-400 text-lg">error</span>
<span class="text-red-800 dark:text-red-300 text-sm font-semibold">Urgente</span>
</div>
</div>
<!-- Bottom Navigation Bar -->
<nav class="flex h-20 w-full items-center border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-background-dark px-4 pb-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">map</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Mapa</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">list_alt</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Lista</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">bar_chart</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Painel</span>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-bold uppercase tracking-wider">Perfil</span>
</a>
</nav>
</div>
</body></html>
