<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Header Section -->
<header class="sticky top-0 z-10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10">
<div class="flex items-center p-4 justify-between max-w-2xl mx-auto">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined cursor-pointer text-slate-900 dark:text-slate-100">arrow_back</span>
<h1 class="text-xl font-bold leading-tight tracking-tight">Nova Obra</h1>
</div>
<div class="text-primary">
<span class="material-symbols-outlined">more_vert</span>
</div>
</div>
</header>
<main class="max-w-2xl mx-auto pb-32">
<!-- Photo Upload Section -->
<div class="flex p-6 flex-col items-center">
<div class="relative group cursor-pointer">
<div class="bg-primary/5 dark:bg-primary/10 border-2 border-dashed border-primary/30 aspect-square rounded-xl h-40 w-40 flex flex-col items-center justify-center overflow-hidden transition-all hover:border-primary/50" data-alt="Close up of a colorful oil painting texture" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDzvBQONBLzePzo6XLBU8vMa9Sn0f9hZZNq0tzWC6z1MkswDu_iqJExgezD7j7NTpbD9OHzlUHaWG7roi2RDfWsLGc_tA8Z1Q468CwUuiOloFMiunQi51Dt0fhyuDa5-nghO5FUT4hwE65uR24GLpNo-EJcO15Pziwld3pkYwe2N7cPNuSk5vwXnS2roJpqys0SGRAtJctVBPMswNhX0V0YLfySdcwrbm3ovgpB__JwLZd-kFJzp3WlrG4OsnAwNyYiFYp4c-7OmAZl"); background-size: cover; background-position: center;'>
<div class="absolute inset-0 bg-black/40 flex flex-col items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-white text-3xl">photo_camera</span>
</div>
</div>
</div>
<div class="mt-4 text-center">
<p class="text-lg font-bold">Adicionar Foto</p>
<p class="text-slate-500 dark:text-slate-400 text-sm">Toque para alterar a imagem principal</p>
</div>
</div>
<!-- Form Fields -->
<div class="px-4 space-y-6">
<div class="space-y-4">
<label class="flex flex-col gap-2">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Nome da Obra</span>
<input class="form-input w-full rounded-xl border-primary/20 bg-white dark:bg-slate-900 focus:border-primary focus:ring-primary h-14 px-4 text-base" placeholder="Ex: O Grito Retocado" type="text"/>
</label>
<label class="flex flex-col gap-2">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Artista</span>
<input class="form-input w-full rounded-xl border-primary/20 bg-white dark:bg-slate-900 focus:border-primary focus:ring-primary h-14 px-4 text-base" placeholder="Ex: Candido Portinari" type="text"/>
</label>
</div>
<!-- Chips Section -->
<div class="space-y-3">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Tipo de Obra</span>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full bg-primary text-white text-sm font-medium">Escultura</button>
<button class="px-4 py-2 rounded-full bg-primary/10 text-primary border border-primary/20 text-sm font-medium">Mural</button>
<button class="px-4 py-2 rounded-full bg-primary/10 text-primary border border-primary/20 text-sm font-medium">Pintura</button>
<button class="px-4 py-2 rounded-full bg-primary/10 text-primary border border-primary/20 text-sm font-medium">Instalação</button>
<button class="px-4 py-2 rounded-full bg-primary/10 text-primary border border-primary/20 text-sm font-medium">Monumento</button>
</div>
</div>
<!-- Conservation Status Grid -->
<div class="space-y-3">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Estado de Conservação</span>
<div class="grid grid-cols-2 gap-3">
<div class="p-4 rounded-xl border-2 border-primary bg-primary/5 flex flex-col items-center gap-2 cursor-pointer">
<span class="material-symbols-outlined text-green-600">check_circle</span>
<span class="font-bold text-sm">Bom</span>
</div>
<div class="p-4 rounded-xl border border-primary/10 bg-white dark:bg-slate-900 flex flex-col items-center gap-2 cursor-pointer hover:border-primary/30">
<span class="material-symbols-outlined text-yellow-500">info</span>
<span class="font-bold text-sm">Regular</span>
</div>
<div class="p-4 rounded-xl border border-primary/10 bg-white dark:bg-slate-900 flex flex-col items-center gap-2 cursor-pointer hover:border-primary/30">
<span class="material-symbols-outlined text-orange-500">warning</span>
<span class="font-bold text-sm">Precário</span>
</div>
<div class="p-4 rounded-xl border border-primary/10 bg-white dark:bg-slate-900 flex flex-col items-center gap-2 cursor-pointer hover:border-primary/30">
<span class="material-symbols-outlined text-red-500">error</span>
<span class="font-bold text-sm">Urgente</span>
</div>
</div>
</div>
<!-- Address Field -->
<label class="flex flex-col gap-2">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Endereço</span>
<div class="relative">
<input class="form-input w-full rounded-xl border-primary/20 bg-white dark:bg-slate-900 focus:border-primary focus:ring-primary h-14 pl-12 pr-4 text-base" placeholder="Rua, Número, Bairro..." type="text"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/60">location_on</span>
</div>
</label>
<!-- Notes Textarea -->
<label class="flex flex-col gap-2">
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Notas e Observações</span>
<textarea class="form-textarea w-full rounded-xl border-primary/20 bg-white dark:bg-slate-900 focus:border-primary focus:ring-primary min-h-[120px] p-4 text-base" placeholder="Descreva detalhes técnicos ou histórico da obra..."></textarea>
</label>
</div>
</main>
<!-- Sticky Bottom Action -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md border-t border-primary/10">
<div class="max-w-2xl mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                Salvar Obra
            </button>
</div>
</div>
</body></html>
